<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fireworks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #050508;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #ui {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 10;
    }
    .btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 0.05em;
      padding: 7px 14px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
    .btn.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
    #hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.2);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      pointer-events: none;
      transition: opacity 1s;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">KLICKEN ZUM ABFEUERN</div>
  <div id="ui">
    <button class="btn active" id="btn-auto" onclick="toggleAuto()">⏸ AUTO</button>
    <button class="btn" onclick="spawnType('normal')">💥 BURST</button>
    <button class="btn" onclick="spawnType('star')">⭐ STERN</button>
    <button class="btn" onclick="spawnType('ring')">💍 RING</button>
    <button class="btn" onclick="spawnType('heart')">❤️ HERZ</button>
    <button class="btn" onclick="spawnType('willow')">🌿 WEIDE</button>
    <button class="btn" onclick="spawnType('chrysanthemum')">🌸 CHRYSANTHEME</button>
    <button class="btn" onclick="spawnMega()">🔥 MEGA</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
